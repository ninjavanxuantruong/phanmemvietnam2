<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Battle Mobile - Masters Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pkm_3d.css">
    <link rel="stylesheet" href="pkm_arena3d.css"><!-- ✅ THÊM DÒNG NÀY -->
    <style>
        

        

        /* --- BATTLE LOG --- */
        #battle-log {
            position: fixed;
            top: 50%;               /* Giữa màn hình dọc */
            left: 50%;              /* Giữa màn hình ngang */
            transform: translate(-50%, -50%);

            width: 90%;
            text-align: center;

            /* Xóa nền, xóa viền */
            background: transparent; 
            border: none;

            /* Làm chữ nổi bật trên mọi nền bằng đổ bóng (shadow) */
            color: #fff;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.4);

            z-index: 9999;
            pointer-events: none;
        }

        /* --- QUIZ OVERLAY --- */
        /* --- QUIZ OVERLAY --- */
        #quiz-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Giữ màu nền tối nhẹ để nổi bật câu hỏi, nhưng xóa blur */
            background-color: rgba(0, 0, 0, 0.6); 
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Xóa bỏ dòng backdrop-filter: blur(2px) cũ ở đây */
        }
        .quiz-card {
            background: white;
            color: #333;
            width: 90%;          /* Chỉnh lại độ rộng cho mobile */
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid #ffcb05;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Thêm bóng đổ để tách biệt với nền */
        }

        .quiz-question { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- ✅ VICTORY OVERLAY --- */
        #victory-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(20,20,60,0.95) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(5px);
            animation: victoryFadeIn 0.5s ease-out;
        }

        @keyframes victoryFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }

        .victory-title {
            font-size: 52px;
            font-weight: 900;
            font-style: italic;
            color: #ffcb05;
            text-shadow: 0 0 30px #ffcb05, 0 0 60px #ff9500;
            animation: victoryPulse 1.5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .victory-subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .victory-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px #ffcb05);
            animation: victoryFloat 2s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes victoryFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-15px); }
        }

        .victory-exp {
            background: rgba(255, 203, 5, 0.15);
            border: 2px solid #ffcb05;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 900;
            color: #ffcb05;
            margin-bottom: 30px;
        }

        .btn-victory-back {
            background: linear-gradient(135deg, #ffcb05, #ff9500);
            color: #000;
            border: none;
            padding: 16px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(255,203,5,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-victory-back:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255,203,5,0.3);
        }

        /* --- HIỆU ỨNG RUNG --- */
        .shake { animation: shakeAnim 0.3s; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes damageFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        /* Đảm bảo Pokemon không bị đè bởi các hiệu ứng khác khi húc */
        
        #skill-scene-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;      
            z-index: 50;        
            pointer-events: none; 
            transition: opacity 0.3s ease;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
        }

        #quiz-overlay, #victory-overlay {
            z-index: 1000 !important; 
        }

        
    </style>
</head>
<body>
    <div class="game-viewport">
        

        <main id="battle-arena" class="battle-arena">
            <div id="player-team-container"></div>  <!-- SẼ TỰ ĐỘNG CÓ CLASS "player-side" TỪ JS -->
            <div id="enemy-team-container"></div>   <!-- SẼ TỰ ĐỘNG CÓ CLASS "enemy-side" TỪ JS -->
            <div id="battle-log"></div>
            <div id="turn-display"></div>
            <div id="quiz-stats">...</div>
        </main>

        
    </div>
    <div id="skill-scene-overlay"></div>

    <!-- QUIZ OVERLAY -->
    <div id="quiz-overlay">
        <div class="quiz-card">
            <div class="quiz-question" id="quiz-word">Question?</div>
            <div class="options-grid" id="quiz-options"></div>
        </div>
    </div>
    

    <!-- ✅ VICTORY OVERLAY -->
    <div id="victory-overlay">
        <div class="victory-title">🏆 CHIẾN THẮNG!</div>
        <div class="victory-subtitle">Victory!</div>
        <img class="victory-img" id="victory-pkm-img"
             src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
             alt="Victory Pokemon">
        <div class="victory-exp" id="victory-exp-text">+ 10 EXP</div>
        <button class="btn-victory-back" onclick="window.location.href='pkm_map.html'">
            🗺️ QUAY LẠI BẢN ĐỒ
        </button>
    </div>

    <script src="global-config.js"></script>
    <script src="pkm_skill.js"></script>

    <script src="pkm_styles.js"></script> 

    <script type="module" src="pkm_quiz.js"></script>
    <script src="pkm_arena3d.js"></script>
    <script src="pkm_battle.js"></script>
</body>
</html>
