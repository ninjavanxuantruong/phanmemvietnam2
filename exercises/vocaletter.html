<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VocaLetter – Pokémon Vocabulary</title>
  <style>
    :root {
      --poke-blue: #2A75BB;
      --poke-yellow: #FFCB05;
      --bg-light: #f4f7f9;
      --text-main: #333;
      --card-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg-light);
      color: var(--text-main);
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 15px;
    }

    header {
      text-align: center;
      padding: 20px 0;
      background: linear-gradient(135deg, var(--poke-blue), #1e5a91);
      color: white;
      border-radius: 0 0 20px 20px;
      margin-bottom: 20px;
      box-shadow: var(--card-shadow);
    }

    h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

    .controls-card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .input-group { display: flex; align-items: center; gap: 10px; }

    #letterInput { 
      width: 60px; 
      height: 40px;
      text-transform: uppercase; 
      text-align: center; 
      font-size: 20px;
      font-weight: bold;
      border: 2px solid var(--poke-blue);
      border-radius: 8px;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    #runBtn { background: var(--poke-blue); color: white; }
    /* ĐÃ SỬA: Bỏ display: none để nút luôn hiện */
    #reviewBtn { background: var(--poke-yellow); color: #333; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }

    .table-wrapper {
      background: white;
      border-radius: 15px;
      overflow-x: auto;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f8f9fa; color: var(--poke-blue); font-weight: bold; }
    
    .tickBox { width: 18px; height: 18px; cursor: pointer; }

    #reviewArea {
      display: none; 
      background: white;
      border: 3px solid var(--poke-yellow);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      margin-top: 20px;
      position: relative;
    }

    /* Pikachu container */
    #pikachu { margin-top: 20px; text-align: center; }
    #pikachu img { width: 120px; transition: transform 0.1s; }

    .status-text { font-size: 14px; color: #666; text-align: center; margin-bottom: 10px; }

    @media (max-width: 600px) {
      .controls-card { flex-direction: column; }
      #letterInput { width: 100%; }
      button { width: 100%; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 VocaLetter</h1>
</header>

<div class="container">
  <div class="controls-card">
    <div class="input-group">
      <label for="letterInput">Chữ cái:</label>
      <input id="letterInput" type="text" maxlength="1" placeholder="A" />
    </div>
    <button id="runBtn">XEM TỪ VỰNG</button>
    <button id="reviewBtn">🔥 ÔN TẬP NGAY</button>
  </div>

  <div id="status" class="status-text"></div>

  <div id="vocaResult" class="table-wrapper"></div>

  <div id="reviewArea"></div>

  <div id="pikachu">
    <img id="pikachuImg" src="pikachuclose.png" alt="Pikachu">
    <div id="pikachuStatus" class="muted"></div>
  </div>
</div>

<script src="link.js"></script>
<script src="imagecache2.js"></script>
<script src="vocaletter.js" type="module"></script>

<script>
  const letterInp = document.getElementById('letterInput');
  const runBtn = document.getElementById('runBtn');
  const reviewBtn = document.getElementById('reviewBtn');
  const reviewArea = document.getElementById('reviewArea');

  // Nhấn Enter để chạy Thống kê
  letterInp.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') runBtn.click();
  });

  // Khi bấm Ôn tập: Hiện vùng ôn tập và cuộn xuống mượt mà
  reviewBtn.addEventListener('click', () => {
    reviewArea.style.display = 'block';
    reviewArea.scrollIntoView({ behavior: 'smooth' });
  });
</script>

</body>
</html>
