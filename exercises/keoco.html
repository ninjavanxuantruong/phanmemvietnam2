<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Tug of War</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PapaParse CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #3b5ba7 0%, #2a447e 100%);
            overflow-x: hidden;
        }

        .bg-float-elements {
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 20%);
            background-attachment: fixed;
        }

        .pokemon-text-shadow {
            text-shadow: 3px 3px 0 #3b5ba7, -1px -1px 0 #3b5ba7, 1px -1px 0 #3b5ba7, -1px 1px 0 #3b5ba7, 1px 1px 0 #3b5ba7;
        }

        .team-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .score-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-shadow {
            box-shadow: 0 4px 0 #800000;
        }

        .reset-btn-shadow {
            box-shadow: 0 4px 0 #c79a00;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .animate-pulse-slow {
            animation: pulse-slow 2s ease-in-out infinite;
        }

        .rope-transition {
            transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Pokeball animation for winner */
        @keyframes champion {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .animate-champion {
            animation: champion 1s ease-in-out infinite;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-float-elements">
    <div id="app" class="min-h-screen py-10 px-4 flex items-center justify-center">
        <!-- Loading Screen -->
        <div id="loading-screen" class="flex flex-col items-center justify-center">
            <div class="animate-spin-slow mb-4">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Loading" class="w-16 h-16">
            </div>
            <p class="text-xl font-bold text-white drop-shadow-md">Đang tải dữ liệu Pokémon...</p>
        </div>

        <!-- Main Game Container -->
        <div id="game-container" class="bg-white/95 rounded-[50px] p-8 shadow-2xl w-full max-w-[1300px] border-[5px] border-[#ffcb05] relative z-10 hidden">
            
            <!-- Header -->
            <div class="flex justify-center items-center gap-5 mb-5">
                <div class="animate-spin-slow">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Pokeball" class="w-12 h-12">
                </div>
                <h1 class="text-4xl font-bold bg-gradient-to-br from-[#ffcb05] to-[#3b5ba7] bg-clip-text text-transparent pokemon-text-shadow tracking-widest uppercase">
                    POKEMON TUG OF WAR
                </h1>
                <div class="animate-spin-slow">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Pokeball" class="w-12 h-12">
                </div>
            </div>

            <!-- Control Panel (Top) -->
            <div class="flex flex-wrap gap-4 justify-center items-center p-6 bg-gradient-to-r from-[#f8f9fa] to-[#e9ecef] rounded-[40px] mb-8 border-4 border-[#3b4cca] shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="bg-[#3b4cca] p-2 rounded-full">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png" alt="Topic" class="w-6 h-6 invert">
                    </div>
                    <label class="text-lg font-black text-[#3b4cca] uppercase tracking-tight">Chế độ:</label>
                    <select id="mode-select" class="text-lg font-bold px-6 py-2.5 rounded-[30px] border-3 border-[#3b4cca] bg-white cursor-pointer focus:outline-none hover:bg-slate-50 transition-colors">
                        <option value="pvp">2 Người chơi</option>
                        <option value="pve">Đấu với Máy</option>
                    </select>
                </div>

                <div class="flex items-center gap-3">
                    <div class="bg-[#3b4cca] p-2 rounded-full">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png" alt="Topic" class="w-6 h-6 invert">
                    </div>
                    <label class="text-lg font-black text-[#3b4cca] uppercase tracking-tight">Chủ đề:</label>
                    <select id="topic-select" class="text-lg font-bold px-6 py-2.5 rounded-[30px] border-3 border-[#3b4cca] bg-white cursor-pointer focus:outline-none hover:bg-slate-50 transition-colors">
                        <!-- Topics will be populated here -->
                    </select>
                </div>

                <div class="flex items-center gap-3">
                    <div class="bg-[#ffcb05] p-2 rounded-full">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/lucky-egg.png" alt="Count" class="w-6 h-6">
                    </div>
                    <label class="text-lg font-black text-[#3b4cca] uppercase tracking-tight">Số câu:</label>
                    <select id="count-select" class="text-lg font-bold px-6 py-2.5 rounded-[30px] border-3 border-[#3b4cca] bg-white cursor-pointer focus:outline-none hover:bg-slate-50 transition-colors">
                        <option value="10">10 câu</option>
                        <option value="15" selected>15 câu</option>
                        <option value="20">20 câu</option>
                        <option value="25">25 câu</option>
                        <option value="30">30 câu</option>
                    </select>
                </div>

                <div class="flex gap-3">
                    <button id="start-btn" class="text-lg px-8 py-3 rounded-[30px] bg-gradient-to-r from-[#ff0000] to-[#cc0000] text-white font-black uppercase tracking-widest shadow-[0_5px_0_#800000] transition-all hover:-translate-y-1 active:translate-y-0.5">
                        🏆 Bắt đầu
                    </button>
                    
                    <button id="reset-btn" class="flex items-center gap-2 bg-[#ffcb05] text-[#3b4cca] px-8 py-3 rounded-[30px] text-lg font-black uppercase tracking-widest shadow-[0_5px_0_#c79a00] transition-all hover:-translate-y-1 active:translate-y-0.5">
                        <i data-lucide="rotate-ccw" style="width: 22px; height: 22px; stroke-width: 3px;"></i> Chơi lại
                    </button>
                </div>
            </div>

            <!-- Teams Display -->
            <div class="flex justify-between items-center mb-8 gap-5">
                <div class="flex-1 flex items-center gap-5 px-8 py-5 rounded-[60px] bg-gradient-to-br from-white to-[#fff0f0] border-3 border-[#ff6b6b] team-shadow transition-transform hover:-translate-y-1">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard" class="w-20 h-20 drop-shadow-md">
                    <div class="text-2xl font-bold text-[#ff6b6b]">ĐỘI CHARIZARD 🔥</div>
                </div>
                <div class="flex-1 flex items-center gap-5 px-8 py-5 rounded-[60px] bg-gradient-to-br from-white to-[#f0fffe] border-3 border-[#4ecdc4] team-shadow transition-transform hover:-translate-y-1">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png" alt="Blastoise" class="w-20 h-20 drop-shadow-md">
                    <div class="text-2xl font-bold text-[#4ecdc4]">ĐỘI BLASTOISE 💧</div>
                </div>
            </div>

            <!-- Tug of War Area -->
            <div class="relative h-[180px] my-12 bg-gradient-to-r from-[#87ceeb] to-[#e0f6ff] rounded-[90px] overflow-hidden border-4 border-[#ffcb05] shadow-inner">
                <div class="absolute left-0 top-0 h-full w-1/2 bg-gradient-to-r from-[#ff6b6b4d] to-transparent flex items-center">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard" class="w-30 h-30 ml-5 drop-shadow-lg">
                </div>
                <div class="absolute right-0 top-0 h-full w-1/2 bg-gradient-to-l from-[#4ecdc44d] to-transparent flex items-center justify-end">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png" alt="Blastoise" class="w-30 h-30 mr-5 drop-shadow-lg">
                </div>
                
                <!-- Tug Bar -->
                <div id="rope-bar" class="rope-transition absolute left-1/2 -translate-x-1/2 w-[100px] h-full bg-gradient-to-br from-[#ffe066] to-[#fcc419] rounded-[50px] shadow-lg z-20 border-3 border-[#e67700] flex items-center justify-center">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png" alt="Master Ball" class="w-15 h-15 animate-pulse-slow">
                </div>

                <!-- Scores -->
                <div id="score-team1" class="absolute top-[-35px] left-5 font-bold text-2xl px-6 py-2 rounded-[40px] text-white bg-[#ff6b6b] score-shadow z-30">0</div>
                <div id="score-team2" class="absolute top-[-35px] right-5 font-bold text-2xl px-6 py-2 rounded-[40px] text-white bg-[#4ecdc4] score-shadow z-30">0</div>
            </div>

            <!-- Status Line -->
            <div id="status-line" class="text-center text-white text-sm font-bold drop-shadow-md mb-5 min-h-[24px]"></div>

            <!-- Play Area -->
            <div class="flex gap-8 my-8">
                <!-- Team A Play -->
                <div id="play-team1" class="flex-1 p-8 rounded-[40px] border-4 border-[#ff6b6b] bg-gradient-to-br from-white to-[#fff5f5] shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4 p-4 rounded-[25px] text-white text-2xl font-black bg-gradient-to-br from-[#ff8787] to-[#ff6b6b] shadow-md">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard" class="w-14 h-14 drop-shadow-md">
                            <span>ĐỘI CHARIZARD</span>
                        </div>
                        <div class="flex items-center gap-2 text-xl font-black text-[#ff6b6b] bg-white px-5 py-2 rounded-full border-2 border-[#ff6b6b]">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/life-orb.png" alt="Timer" class="w-6 h-6">
                            <span id="progress-team1">0/0</span>
                        </div>
                    </div>
                    
                    <!-- Pokeball Container -->
                    <div class="relative overflow-hidden rounded-[40px] border-4 border-[#333] shadow-2xl bg-white mb-6">
                        <div class="bg-[#ff0000] pt-10 pb-12 px-6 text-center border-b-8 border-[#333]">
                            <div id="question-team1" class="text-3xl font-black text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] uppercase tracking-tight">Sẵn sàng?</div>
                        </div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-[#333] rounded-full flex items-center justify-center z-10 border-4 border-[#333]">
                            <div class="w-10 h-10 bg-white rounded-full border-4 border-[#333] flex items-center justify-center">
                                <div class="w-4 h-4 bg-slate-200 rounded-full border-2 border-[#333]"></div>
                            </div>
                        </div>
                        <div class="bg-white pt-12 pb-8 px-6">
                            <div id="options-team1" class="grid grid-cols-2 gap-4">
                                <!-- Options will be injected here -->
                            </div>
                            <div id="placeholder-team1" class="h-[200px] flex items-center justify-center text-slate-400 font-bold text-xl italic">
                                Nhấn "Bắt đầu" để mở Pokeball...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Team B Play -->
                <div id="play-team2" class="flex-1 p-8 rounded-[40px] border-4 border-[#4ecdc4] bg-gradient-to-br from-white to-[#f5fffe] shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4 p-4 rounded-[25px] text-white text-2xl font-black bg-gradient-to-br from-[#6cd4cc] to-[#4ecdc4] shadow-md">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png" alt="Blastoise" class="w-14 h-14 drop-shadow-md">
                            <span>ĐỘI BLASTOISE</span>
                        </div>
                        <div class="flex items-center gap-2 text-xl font-black text-[#4ecdc4] bg-white px-5 py-2 rounded-full border-2 border-[#4ecdc4]">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/life-orb.png" alt="Timer" class="w-6 h-6">
                            <span id="progress-team2">0/0</span>
                        </div>
                    </div>
                    
                    <!-- Pokeball Container -->
                    <div class="relative overflow-hidden rounded-[40px] border-4 border-[#333] shadow-2xl bg-white mb-6">
                        <div class="bg-[#ff0000] pt-10 pb-12 px-6 text-center border-b-8 border-[#333]">
                            <div id="question-team2" class="text-3xl font-black text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] uppercase tracking-tight">Sẵn sàng?</div>
                        </div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-[#333] rounded-full flex items-center justify-center z-10 border-4 border-[#333]">
                            <div class="w-10 h-10 bg-white rounded-full border-4 border-[#333] flex items-center justify-center">
                                <div class="w-4 h-4 bg-slate-200 rounded-full border-2 border-[#333]"></div>
                            </div>
                        </div>
                        <div class="bg-white pt-12 pb-8 px-6">
                            <div id="options-team2" class="grid grid-cols-2 gap-4">
                                <!-- Options will be injected here -->
                            </div>
                            <div id="placeholder-team2" class="h-[200px] flex items-center justify-center text-slate-400 font-bold text-xl italic">
                                Nhấn "Bắt đầu" để mở Pokeball...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game Info Footer -->
            <div class="flex justify-between items-center my-5 px-6 py-4 bg-slate-100 rounded-[60px]">
                <div class="flex items-center gap-2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/lucky-egg.png" alt="Round" class="w-8 h-8">
                    <span id="footer-round" class="text-lg font-bold text-slate-600">Vòng 1/15</span>
                </div>
                <div class="flex items-center gap-2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png" alt="Topic" class="w-8 h-8">
                    <span id="footer-topic" class="text-lg font-bold text-slate-600">Chủ đề: -</span>
                </div>
            </div>

            <!-- Winner Message -->
            <div id="winner-message" class="hidden text-center text-4xl font-bold p-8 rounded-[30px] mt-5 animate-champion border-4 border-white text-white">
                🏆 CHIẾN THẮNG! 🏆
            </div>

        </div>
    </div>

    <script src="keoco.js"></script>
</body>
</html>
