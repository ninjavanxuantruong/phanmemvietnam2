<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp Xếp Đội Hình - Pocket Quest</title>
    <style>
        :root {
            --primary: #deff9a;
            --bg: #121212;
            --slot-bg: rgba(255,255,255,0.05);
            --accent: #2ecc71;
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        /* Nút Quay Lại */
        .nav-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: transparent;
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px rgba(222, 255, 154, 0.3);
        }

        /* VÙNG ĐỘI HÌNH */
        .formation {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
            background: rgba(0,0,0,0.5); 
            padding: 40px; 
            border-radius: 20px;
            border: 1px solid rgba(222, 255, 154, 0.2); 
            margin-bottom: 40px;
            position: relative;
        }
        .row { display: flex; gap: 40px; }

        .slot {
            width: 110px; height: 130px; 
            border: 2px dashed #444;
            border-radius: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            position: relative;
            transition: 0.3s;
            background: var(--slot-bg);
        }
        .slot.drag-over { 
            border-color: var(--primary); 
            background: rgba(222, 255, 154, 0.1); 
            transform: scale(1.05); 
        }

        .slot img { width: 90px; height: 90px; object-fit: contain; pointer-events: none; }
        .slot .pos-label { position: absolute; bottom: -25px; font-size: 12px; color: #888; }
        
        .remove-btn {
            position: absolute; top: -8px; right: -8px; 
            background: #ff4757; color: white; 
            border: none; border-radius: 50%; 
            width: 24px; height: 24px;
            cursor: pointer; font-weight: bold; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        /* VÙNG KHO ĐỒ */
        .inventory-section { 
            border-top: 1px solid #333; 
            padding-top: 20px; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        
        .pkm-item {
            background: var(--slot-bg); 
            border-radius: 12px; 
            padding: 15px;
            text-align: center; 
            cursor: grab; 
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .pkm-item:hover { border-color: #555; background: rgba(255,255,255,0.1); }
        .pkm-item img { width: 70px; height: 70px; }
        .pkm-item b { display: block; font-size: 13px; text-transform: capitalize; margin-top: 5px; }
        .pkm-item span { font-size: 11px; color: var(--accent); }
        
        .pkm-item.dragging { opacity: 0.4; }
        .pkm-item.is-in-team { 
            filter: grayscale(0.8) brightness(0.5); 
            cursor: not-allowed; 
        }

        #buff-info {
            background: #1e1e1e; padding: 15px; border-radius: 10px;
            margin-bottom: 20px; border-left: 5px solid var(--primary);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="pkm.html" class="btn-back">← BACK</a>
        <h2 style="margin:0">Xây Dựng Đội Hình</h2>
    </div>

    <div id="buff-info">
        💡 <b>Mẹo:</b> Kéo Pokémon từ kho vào các ô trống. Mỗi cấp độ tăng 5% chỉ số đã được cập nhật từ Trung tâm Nâng cấp!
    </div>

    <div class="formation">
        <div class="row">
            <div class="slot" data-pos="1"><span class="pos-label">Hàng trước 1</span></div>
            <div class="slot" data-pos="2"><span class="pos-label">Hàng trước 2</span></div>
        </div>
        <div style="height: 20px;"></div>
        <div class="row">
            <div class="slot" data-pos="3"><span class="pos-label">Hàng sau 3</span></div>
            <div class="slot" data-pos="4"><span class="pos-label">Hàng sau 4</span></div>
            <div class="slot" data-pos="5"><span class="pos-label">Hàng sau 5</span></div>
        </div>
    </div>

    <div class="inventory-section">
        <h3>Kho Pokémon của bạn</h3>
        <div id="inventory-grid" class="grid"></div>
    </div>

    <!-- Nhúng logic xử lý -->
    <script src="pkm_team.js"></script>
    <script>
        // Khởi tạo giao diện khi trang tải xong
        window.onload = () => {
            if (typeof initTeamPage === "function") {
                initTeamPage();
            }
        };
    </script>
</body>
</html>
