<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Egg Center</title>
    <style>
        :root {
            --gold: #f1c40f;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Thanh trạng thái trên cùng */
        .status-bar {
            width: 100%;
            background: var(--card-bg);
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .stat-item {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .stat-item span {
            color: var(--gold);
        }

        /* Khu vực chính */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .egg-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 3px dashed #444;
            text-align: center;
            max-width: 400px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .egg-card:hover {
            border-color: var(--gold);
        }

        /* Hiệu ứng quả trứng */
        .egg-display {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            cursor: pointer;
            position: relative;
        }

        .egg-display img {
            max-width: 100%;
            filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.5));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Nút bấm */
        .btn-container {
            margin-top: 20px;
        }

        .btn-buy {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #d35400;
        }

        .btn-buy:hover:not(:disabled) {
            background: #d35400;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a04000;
        }

        .btn-buy:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-buy:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            color: #888;
        }

        .btn-back {
            margin-top: 20px;
            background: transparent;
            color: #aaa;
            border: 1px solid #444;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            color: white;
            border-color: white;
        }

        /* Thông báo loading */
        #loading-text {
            margin-top: 10px;
            color: var(--gold);
            font-style: italic;
            display: none;
        }
        /* --- HIỆU ỨNG MỚI BỔ SUNG --- */

        /* 1. Trứng rung lắc dữ dội */
        .egg-shaking {
            animation: shaking 0.15s infinite;
            display: inline-block;
            filter: hue-rotate(90deg) brightness(1.2);
        }

        @keyframes shaking {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(8deg) scale(1.1); }
            50% { transform: rotate(0deg) scale(1.2); }
            75% { transform: rotate(-8deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* 2. Hiệu ứng nổ bùm */
        .egg-explode {
            animation: explode 0.5s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); filter: brightness(1); opacity: 1; }
            50% { transform: scale(2); filter: brightness(5); opacity: 0.5; }
            100% { transform: scale(1); filter: brightness(1); opacity: 1; }
        }

        /* 3. Thẻ Pokémon hiện ra sau khi nổ */
        .pkm-card-result {
            background: #2a2a2a;
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 4. Thanh chỉ số (Stats) */
        .pkm-stats-detail { margin: 10px 0; text-align: left; font-size: 0.85rem; }
        .stat-bar { display: flex; align-items: center; margin-bottom: 5px; }
        .stat-bar span:first-child { width: 60px; }
        .bar-bg { flex-grow: 1; height: 8px; background: #444; border-radius: 4px; margin: 0 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; }
        .hp { background: #ff4d4d; }
        .atk { background: #ff9f43; }
        .def { background: #2e86de; }

        .star-icon { color: var(--gold); font-size: 1.2rem; }
        .pkm-footer { font-size: 0.8rem; color: #aaa; border-top: 1px solid #333; padding-top: 8px; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="stat-item">💰 Danh vọng: <span id="current-dv">0</span></div>
        <div class="stat-item">🎒 Túi đồ: <span id="bag-count">0/10</span></div>
    </div>

    <div class="container">
            <div class="egg-card">
                <h2 style="margin-top: 0;">Ấp Trứng May Mắn</h2>
                <p style="color: #888; font-size: 0.9rem;">Nhận ngẫu nhiên 1 Pokémon Đời 1 mà bạn chưa sở hữu!</p>

                <div id="egg-visual" class="egg-display" onclick="hatchEgg()">
                    <img id="egg-img" src="" style="max-width:100%"> 
                    <span id="egg-icon">🥚</span>
                </div>

                <div id="loading-text">Đang kết nối PokeAPI...</div>

                <div id="pkm-result-info"></div> 

                <div class="btn-container">
                    <button id="buy-btn" class="btn-buy" onclick="hatchEgg()">
                        MUA TRỨNG (50 DV)
                    </button>
                </div>
            </div>
        </div>

        <button class="btn-back" onclick="window.location.href='pkm.html'">
                BACK
        </button>
    </div>

    <!-- Nhúng file logic JS đã viết ở bước trước -->
    <script src="pkm_egg.js"></script>
    <script>
        // Một chút hiệu ứng rung rinh cho nút mua khi đủ tiền
        setInterval(() => {
            const btn = document.getElementById('buy-btn');
            if(!btn.disabled) {
                btn.style.transform = "scale(1.05)";
                setTimeout(() => btn.style.transform = "scale(1)", 200);
            }
        }, 3000);
    </script>
</body>
</html>
