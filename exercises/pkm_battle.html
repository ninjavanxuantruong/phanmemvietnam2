<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Battle Mobile - Masters Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hp-green: #2ecc71;
            --hp-yellow: #f1c40f;
            --hp-red: #e74c3c;
            --ally-blue: #2980b9;
            --enemy-red: #c0392b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #000;
            overflow: hidden;
            color: white;
        }

        .game-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .battle-header {
            padding: 10px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }
        .turn-badge {
            background: rgba(0, 242, 254, 0.2);
            border: 2px solid #00f2fe;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* --- ARENA --- */
        .battle-arena {
            flex: 1;
            position: relative;
            perspective: 800px;
        }

        /* Container chung */
        /* Container chung cho cả 2 bên */
        /* Container chung */
        /* Phe Địch: Đẩy lên cao hơn để bớt trống phía trên */
        .enemy-side {
            top: 5%;                /* Giảm từ 15% xuống 5% để sát đỉnh hơn */
            flex-wrap: wrap-reverse; 
            transform: translateX(-50%) scale(0.85);
        }

        /* Phe Ta: Đẩy xuống thấp hơn để bớt trống phía dưới */
        .player-side {
            bottom: 5%;             /* Giảm từ 10% xuống 5% để sát đáy hơn */
            flex-wrap: wrap;
            transform: translateX(-50%) scale(1.1);
        }

        /* Tăng khoảng cách giữa 2 hàng trong cùng một phe */
        .side {
            position: absolute;
            width: 100%;
            max-width: 340px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 25px 5px;          /* Tăng 8px lên 25px để các hàng giãn nhau ra */
        }

        .pkm-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Đảm bảo Pokemon unit không bị vỡ khung */
        .pkm-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .pkm-unit img {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        /* ✅ Thanh máu mở rộng để hiện số HP */
        .unit-stats {
            width: 80px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #fff;
            border-radius: 10px;
            padding: 3px 5px;
            margin-top: -5px;
            z-index: 5;
        }

        .hp-text {
            font-size: 9px;
            font-weight: 900;
            text-align: center;
            color: #fff;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .hp-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            background: var(--hp-green);
            transition: width 0.5s ease-out, background 0.5s ease-out;
        }

        .active-unit {
            filter: brightness(1.3);
            transform: translateY(-10px) scale(1.1);
        }

        /* --- FOOTER --- */
        .battle-footer {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 10px;
            z-index: 10;
        }

        .trainer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 10px;
            height: 55px;
            border: 1px solid #333;
            padding: 0 10px;
            position: relative;
        }

        .trainer-card {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 40%;
        }

        .trainer-card.ally { color: #3498db; }
        .trainer-card.enemy { color: #e74c3c; flex-direction: row-reverse; text-align: right; }
        .trainer-card img { width: 45px; height: 45px; border-radius: 50%; background: #333; }
        .trainer-name { font-weight: 900; font-size: 14px; text-transform: uppercase; }

        .vs-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            font-size: 20px;
            font-style: italic;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- BATTLE LOG --- */
        #battle-log {
            position: fixed;
            top: 50%;               /* Giữa màn hình dọc */
            left: 50%;              /* Giữa màn hình ngang */
            transform: translate(-50%, -50%);

            width: 90%;
            text-align: center;

            /* Xóa nền, xóa viền */
            background: transparent; 
            border: none;

            /* Làm chữ nổi bật trên mọi nền bằng đổ bóng (shadow) */
            color: #fff;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.4);

            z-index: 9999;
            pointer-events: none;
        }

        /* --- QUIZ OVERLAY --- */
        /* --- QUIZ OVERLAY --- */
        #quiz-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Giữ màu nền tối nhẹ để nổi bật câu hỏi, nhưng xóa blur */
            background-color: rgba(0, 0, 0, 0.6); 
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Xóa bỏ dòng backdrop-filter: blur(2px) cũ ở đây */
        }
        .quiz-card {
            background: white;
            color: #333;
            width: 90%;          /* Chỉnh lại độ rộng cho mobile */
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid #ffcb05;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Thêm bóng đổ để tách biệt với nền */
        }

        .quiz-question { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- ✅ VICTORY OVERLAY --- */
        #victory-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(20,20,60,0.95) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(5px);
            animation: victoryFadeIn 0.5s ease-out;
        }

        @keyframes victoryFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }

        .victory-title {
            font-size: 52px;
            font-weight: 900;
            font-style: italic;
            color: #ffcb05;
            text-shadow: 0 0 30px #ffcb05, 0 0 60px #ff9500;
            animation: victoryPulse 1.5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .victory-subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .victory-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px #ffcb05);
            animation: victoryFloat 2s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes victoryFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-15px); }
        }

        .victory-exp {
            background: rgba(255, 203, 5, 0.15);
            border: 2px solid #ffcb05;
            border-radius: 15px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 900;
            color: #ffcb05;
            margin-bottom: 30px;
        }

        .btn-victory-back {
            background: linear-gradient(135deg, #ffcb05, #ff9500);
            color: #000;
            border: none;
            padding: 16px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(255,203,5,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-victory-back:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255,203,5,0.3);
        }

        /* --- HIỆU ỨNG RUNG --- */
        .shake { animation: shakeAnim 0.3s; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes damageFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        /* Đảm bảo Pokemon không bị đè bởi các hiệu ứng khác khi húc */
        .pkm-unit {
            transition: transform 0.2s;
            z-index: 1;
        }
        .skill-mode .pkm-unit[style*="opacity: 1"] {
            z-index: 99;
        }
        #skill-scene-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;      
            z-index: 50;        
            pointer-events: none; 
            transition: opacity 0.3s ease;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
        }

        #quiz-overlay, #victory-overlay {
            z-index: 1000 !important; 
        }

        .pkm-unit {
            position: relative; 
        }
    </style>
</head>
<body>
    <div class="game-viewport">
        <header class="battle-header">
            <div class="turn-badge">Turn: <span id="current-turn">1</span>/15</div>
        </header>

        <main class="battle-arena">
            <div class="side enemy-side" id="enemy-team-container"></div>
            <div class="side player-side" id="player-team-container"></div>
            <div id="battle-log"></div>
            <div id="quiz-stats" style="
                position: absolute;
                top: 10px; right: 10px;
                background: rgba(0,0,0,0.6);
                border: 1px solid #444;
                border-radius: 8px;
                padding: 5px 12px;
                font-size: 12px;
                font-weight: bold;
                color: white;
                z-index: 10;
            ">✅ 0 &nbsp; ❌ 0 &nbsp; 📊 0 câu</div>
        </main>

        <footer class="battle-footer">
            <div class="trainer-bar">
                <div class="trainer-card ally">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/red.png" id="ally-avatar">
                    <span class="trainer-name" id="ally-name">TRAINER</span>
                </div>
                <div class="vs-logo">VS</div>
                <div class="trainer-card enemy">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png" id="enemy-avatar">
                    <span class="trainer-name">ENEMY TEAM</span>
                </div>
            </div>
        </footer>
    </div>
    <div id="skill-scene-overlay"></div>

    <!-- QUIZ OVERLAY -->
    <div id="quiz-overlay">
        <div class="quiz-card">
            <div class="quiz-question" id="quiz-word">Question?</div>
            <div class="options-grid" id="quiz-options"></div>
        </div>
    </div>
    

    <!-- ✅ VICTORY OVERLAY -->
    <div id="victory-overlay">
        <div class="victory-title">🏆 CHIẾN THẮNG!</div>
        <div class="victory-subtitle">Victory!</div>
        <img class="victory-img" id="victory-pkm-img"
             src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
             alt="Victory Pokemon">
        <div class="victory-exp" id="victory-exp-text">+ 10 EXP</div>
        <button class="btn-victory-back" onclick="window.location.href='pkm_map.html'">
            🗺️ QUAY LẠI BẢN ĐỒ
        </button>
    </div>

    <script src="backgroundgame.js"></script>
    <script src="global-config.js"></script>
    <script src="pkm_skill.js"></script>
    <script type="module" src="pkm_quiz.js"></script>
    <script src="pkm_battle.js"></script>
</body>
</html>
