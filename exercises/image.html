<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎮 Huấn luyện từ vựng Pokémon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #232526, #414345);
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      text-shadow: 2px 2px 6px #000;
    }

    #modeSelector {
      margin-bottom: 24px;
    }

    .mode-btn {
      padding: 10px 16px;
      margin: 0 6px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #fdd835;
      color: #000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .mode-btn.active {
      background: #f44336;
      color: #fff;
    }

    .hidden {
      display: none;
    }

    #scoreBoard {
      font-size: 18px;
      margin-bottom: 16px;
    }

    #exerciseArea {
      margin-bottom: 24px;
    }

    #finalBox {
      font-size: 22px;
      margin-top: 24px;
    }

    .quiz-container {
      margin-top: 24px;
    }

    /* ✅ Responsive cho nút chế độ trên điện thoại */
    @media (max-width: 600px) {
      .mode-btn {
        display: block;
        margin: 8px auto;
        width: 90%;
      }
    }

    /* ✅ Responsive cho dạng 1: thẻ ảnh */
    .card-container-d1 {
      display: grid;
      gap: 12px;
      margin: 20px;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .card-container-d1 {
        grid-template-columns: repeat(2, 1fr); /* mobile: 2 cột */
      }
    }

    @media (min-width: 601px) {
      .card-container-d1 {
        grid-template-columns: repeat(auto-fit, minmax(140px, 160px)); /* desktop: nhiều cột vừa khít */
      }
    }

  </style>
</head>
<body>
  <h1>🎮 Hành trình huấn luyện Pokémon</h1>

  <div id="modeSelector">
    <button class="mode-btn active" data-mode="1">Dạng 1: Chọn hình qua âm thanh - Dễ</button>
    <button class="mode-btn" data-mode="2">Dạng 2: Chọn từ qua hình - Trung bình</button>
    <button class="mode-btn" data-mode="3">Dạng 3: Gõ từ qua ảnh mờ - Khó</button>
  </div>

  <p id="scoreBoard">🎯 Tổng điểm: 0/0</p>

  <div id="exerciseArea"></div>

  <div id="finalBox"></div>
  <div class="quiz-container"></div>

  <script src="link.js"></script>
  <script type="module" src="image.js"></script>
</body>
</html>
