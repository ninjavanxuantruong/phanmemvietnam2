<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Q&amp;A — Vocabulary Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #ff1c1c;
      --bg-bottom: #ffffff;
      --text: #111;
      --blue: #3b4cca;
      --green: #059669;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 40%),
        linear-gradient(180deg, var(--bg-top) 50%, var(--bg-bottom) 50%);
      color: var(--text);
    }

    .wrap {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
    }

    header {
      text-align: center;
      color: #fff;
      padding-top: 12px;
      text-shadow: 0 3px 0 #b10303, 0 6px 12px rgba(0,0,0,.35);
    }
    header .title { font-size: clamp(20px, 4vw, 30px); font-weight: 800; letter-spacing: .5px; }
    header .subtitle { font-size: clamp(11px, 2.5vw, 13px); opacity: .95; margin-top: 6px; }

    .panel {
      display: flex; flex-wrap: wrap;
      gap: 12px; justify-content: center; align-items: center;
      padding: 6px 12px;
    }
    .panel label { color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.35); font-size: 12px; }
    select, button {
      font-family: inherit; font-size: 12px; padding: 8px 10px; border-radius: 10px;
      border: 2px solid var(--blue); background: #fff; color: #111;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
    }
    button { cursor: pointer; background: linear-gradient(90deg, var(--blue), #5b6efc); color: #fff; border: none; font-weight: 700; }
    button:disabled { opacity: .55; cursor: default; }
    #hintBtn { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    #nextBtn { background: linear-gradient(90deg, var(--green), #10b981); }
    #prevBtn { background: linear-gradient(90deg, #64748b, #94a3b8); }
    #refreshBtn { background: #64748b; }

    .status { text-align: center; color: #fff; font-size: 11px; text-shadow: 0 2px 8px rgba(0,0,0,.35); min-height: 16px; }

    .stage {
      width: 100%;
      min-height: calc(100vh - 220px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      width: min(1100px, 96vw);
      max-height: calc(100vh - 260px);
      background: rgba(255,255,255,.92);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      padding: clamp(14px, 2.5vw, 22px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(14px, 3vw, 26px);
      align-items: center;
    }

    /* Trái: ảnh minh họa */
    .imageBox {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 14px;
      background: rgba(0,0,0,.06);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .imageBox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Phải: câu hỏi + đáp án */
    .qaSide {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }

    #progress-badge {
      background: var(--green);
      color: white;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: clamp(0.9rem, 1.4vw, 1.1rem);
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }

    .q-tag {
      background: #e0e7ff;
      color: var(--blue);
      padding: 4px 14px;
      border-radius: 10px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: clamp(0.7rem, 0.9vw, 0.85rem);
    }

    .qHeaderRow {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .replayBtn {
      background: #eef2ff;
      color: var(--blue);
      border: 2px solid var(--blue);
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 8px;
      box-shadow: none;
    }

    #questionText {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      color: var(--blue);
      font-weight: 900;
      margin: 0;
      line-height: 1.25;
      word-break: break-word;
    }

    #answerBox {
      display: none;
      background: #ecfdf5;
      border: 2px solid var(--green);
      border-radius: 14px;
      padding: 14px 18px;
      width: 100%;
    }
    #answerBox .label {
      font-size: 11px;
      color: var(--green);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .5px;
    }
    #answerText {
      font-size: clamp(1.2rem, 2.6vw, 1.9rem);
      color: #065f46;
      font-weight: 800;
      margin-top: 4px;
      word-break: break-word;
    }

    .actionRow { display: flex; gap: 12px; }
    .actionRow button { font-size: 13px; padding: 10px 20px; }

    footer { text-align: center; padding-bottom: 14px; color: #333; font-size: 10px; }

    @media (max-width: 760px) {
      .card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">Q&amp;A — Vocabulary Trainer</div>
      <div class="subtitle">Ảnh minh họa từ vựng • câu hỏi • bấm Hint để xem đáp án</div>
    </header>

    <div class="panel">
      <select id="topicSelect">
        <option value="ALL">-- Tất cả chủ đề --</option>
      </select>

      <button id="startBtn">Bắt đầu</button>
      <button id="refreshBtn" title="Xoá cache, tải lại dữ liệu mới nhất từ Sheet">🔄 Làm mới dữ liệu</button>
    </div>

    <div class="status" id="statusLine"></div>

    <div class="stage">
      <div class="card">
        <div class="imageBox">
          <img id="qaImage" alt="Illustration" />
        </div>

        <div class="qaSide">
          <div id="progress-badge">
            <span id="current-step">0</span> / <span id="total-step">0</span>
          </div>
          <div class="qHeaderRow">
            <span class="q-tag">Question</span>
            <button id="replayBtn" class="replayBtn" title="Nghe lại câu hỏi">🔊 Nghe lại</button>
          </div>
          <h2 id="questionText">Chọn chủ đề rồi bấm Bắt đầu</h2>

          <div id="answerBox">
            <div class="label">Đáp án</div>
            <div id="answerText"></div>
          </div>

          <div class="actionRow">
            <button id="prevBtn" disabled>◀ Trước</button>
            <button id="hintBtn" disabled>💡 Hint</button>
            <button id="nextBtn" disabled>Tiếp ▶</button>
          </div>
        </div>
      </div>
    </div>

    <footer>Q&amp;A • ảnh minh họa theo từ vựng • giới hạn bài học theo lớp</footer>
  </div>

  <!-- JS logic -->
  <script src="link.js"></script>
  <script src="imagecache2.js"></script>
  <script src="qanda.js"></script>
</body>
</html>
