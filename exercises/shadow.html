<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Shadowing Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0e1016;
    --bg-1:#161925;
    --panel:#1b1f2e;
    --panel-border:#2a2f42;
    --ink-hi:#f3f4f8;
    --ink-mid:#a9adc1;
    --ink-dim:#5c6079;
    --amber:#f6b040;
    --amber-soft:rgba(246,176,64,.16);
    --teal:#4fd1c5;
    --danger:#ef5b6e;
    --radius:18px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(circle at 18% -10%, rgba(246,176,64,.10), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(79,209,197,.08), transparent 40%),
      var(--bg-0);
    color:var(--ink-hi);
    font-family:'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, Arial;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:28px 20px 40px;
    display:flex; flex-direction:column; gap:20px;
  }

  /* ---------- Header ---------- */
  header{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .brand{ display:flex; flex-direction:column; gap:6px; }
  .brand h1{
    font-family:'Sora', sans-serif; font-weight:800; font-size:clamp(22px,3.2vw,30px);
    margin:0; letter-spacing:.2px;
  }
  .brand p{ margin:0; color:var(--ink-mid); font-size:13px; }

  .on-air{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--panel-border);
    padding:8px 14px; border-radius:999px; font-size:12px; color:var(--ink-mid);
    font-family:'Sora',sans-serif; font-weight:600; letter-spacing:.6px; text-transform:uppercase;
  }
  .on-air .dot{
    width:9px; height:9px; border-radius:50%; background:var(--ink-dim);
    transition:background .2s ease;
  }
  body.is-playing .on-air .dot{
    background:var(--danger);
    box-shadow:0 0 0 0 rgba(239,91,110,.6);
    animation:pulse 1.4s ease-out infinite;
  }
  body.is-playing .on-air{ color:var(--ink-hi); border-color:rgba(239,91,110,.35); }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(239,91,110,.55); }
    70%{ box-shadow:0 0 0 9px rgba(239,91,110,0); }
    100%{ box-shadow:0 0 0 0 rgba(239,91,110,0); }
  }

  /* ---------- Controls panel ---------- */
  .panel{
    background:var(--panel); border:1px solid var(--panel-border); border-radius:var(--radius);
    padding:18px 20px; display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;
  }
  .field{ display:flex; flex-direction:column; gap:6px; flex:1 1 140px; min-width:130px; }
  .field label{ font-size:11px; color:var(--ink-mid); text-transform:uppercase; letter-spacing:.6px; font-weight:600; }
  select, .range-shell{
    background:var(--bg-1); border:1px solid var(--panel-border); color:var(--ink-hi);
    border-radius:10px; padding:10px 12px; font-size:13px; font-family:inherit;
  }
  select:focus-visible, button:focus-visible{
    outline:2px solid var(--amber); outline-offset:2px;
  }
  input[type="range"]{
    width:100%; accent-color:var(--amber); background:transparent;
  }
  .btn-row{ display:flex; gap:10px; margin-left:auto; }
  button{
    font-family:'Sora', sans-serif; font-weight:700; font-size:13px; letter-spacing:.2px;
    padding:12px 20px; border-radius:12px; border:none; cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  button:active{ transform:translateY(1px); }
  #startBtn{ background:linear-gradient(135deg,var(--amber),#e8952a); color:#241704; box-shadow:0 8px 20px rgba(246,176,64,.25); }
  #stopBtn{ background:var(--bg-1); color:var(--ink-mid); border:1px solid var(--panel-border); }
  button:disabled{ opacity:.4; cursor:default; box-shadow:none; }

  /* ---------- Progress ---------- */
  .progress-row{ display:flex; align-items:center; gap:12px; }
  .progress-track{ flex:1; height:6px; border-radius:999px; background:var(--bg-1); overflow:hidden; }
  .progress-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--amber),var(--teal)); transition:width .25s ease; }
  .progress-label{ font-size:12px; color:var(--ink-mid); font-variant-numeric:tabular-nums; min-width:44px; text-align:right; }
  .status{ font-size:12.5px; color:var(--ink-mid); min-height:16px; }

  /* ---------- Waveform signature ---------- */
  .waveform{ display:flex; align-items:center; gap:3px; height:22px; }
  .waveform span{
    width:3px; border-radius:2px; background:var(--ink-dim);
    height:6px; transition:background .2s ease;
  }
  body.is-playing .waveform span{ background:var(--teal); animation:eq 900ms ease-in-out infinite; }
  body.is-playing .waveform span:nth-child(1){ animation-delay:0ms; }
  body.is-playing .waveform span:nth-child(2){ animation-delay:80ms; }
  body.is-playing .waveform span:nth-child(3){ animation-delay:160ms; }
  body.is-playing .waveform span:nth-child(4){ animation-delay:240ms; }
  body.is-playing .waveform span:nth-child(5){ animation-delay:100ms; }
  body.is-playing .waveform span:nth-child(6){ animation-delay:200ms; }
  body.is-playing .waveform span:nth-child(7){ animation-delay:40ms; }
  body.is-playing .waveform span:nth-child(8){ animation-delay:280ms; }
  @keyframes eq{
    0%,100%{ height:6px; }
    50%{ height:20px; }
  }

  /* ---------- Reader card ---------- */
  .reader{
    background:var(--panel); border:1px solid var(--panel-border); border-radius:var(--radius);
    padding:8px 8px 4px;
    display:flex; flex-direction:column;
  }
  .reader-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid var(--panel-border);
  }
  .reader-head .label{ font-size:11px; color:var(--ink-mid); text-transform:uppercase; letter-spacing:.6px; font-weight:600; font-family:'Sora',sans-serif; }

  #shadowLine{
    max-height:min(62vh, 560px);
    min-height:160px;
    overflow-y:auto;
    padding:28px clamp(16px,4vw,40px) 32px;
    scroll-behavior:smooth;
  }
  #shadowLine::-webkit-scrollbar{ width:8px; }
  #shadowLine::-webkit-scrollbar-thumb{ background:var(--panel-border); border-radius:8px; }

  .line{
    font-size:clamp(19px, 2.6vw, 27px);
    line-height:2;
    font-weight:400;
  }
  .sentence:not(:last-child)::after{
    content:"·"; color:var(--ink-dim); margin:0 10px; opacity:.5;
  }
  .word{
    display:inline-block; margin:0 2px; padding:2px 3px; border-radius:6px;
    transition:background .18s ease, color .18s ease, opacity .18s ease, transform .18s ease;
  }
  .word.upcoming{ color:var(--ink-dim); opacity:.75; }
  .word.read{ color:var(--ink-mid); opacity:.65; }
  .word.active{
    background:var(--amber-soft); color:var(--amber);
    opacity:1; font-weight:600;
    box-shadow:inset 0 0 0 1px rgba(246,176,64,.35);
    transform:translateY(-1px);
  }
  #shadowLine:empty::before{
    content:"Chọn chủ đề và bấm Bắt đầu để xem đoạn văn ở đây.";
    color:var(--ink-dim); font-size:14px;
  }

  footer{ text-align:center; color:var(--ink-dim); font-size:11.5px; padding-top:6px; }

  #shadowToast{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    background:#20141a; color:var(--ink-hi); border:1px solid rgba(239,91,110,.35);
    padding:10px 18px; border-radius:12px; font-size:13px;
    box-shadow:0 12px 30px rgba(0,0,0,.4);
    display:none; z-index:9999;
  }

  .field.hidden{ display:none; }

  .pause-panel{
    display:none;
    background:linear-gradient(135deg, rgba(79,209,197,.10), rgba(79,209,197,.04));
    border:1px solid rgba(79,209,197,.35); border-radius:var(--radius);
    padding:16px 20px; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  }
  .pause-panel.visible{ display:flex; }
  .pause-text{ font-size:13.5px; color:var(--ink-hi); }
  .pause-text #pauseCountdown{ color:var(--teal); font-weight:700; font-variant-numeric:tabular-nums; }
  .pause-actions{ display:flex; gap:10px; }
  .pause-actions button{
    background:var(--bg-1); color:var(--ink-hi); border:1px solid var(--panel-border);
    padding:10px 16px; font-size:12.5px;
  }
  #continueBtn{ background:linear-gradient(135deg,var(--teal),#2fb3a6); color:#04211d; border:none; }

  @media (max-width:640px){
    .panel{ flex-direction:column; align-items:stretch; }
    .btn-row{ margin-left:0; justify-content:stretch; }
    .btn-row button{ flex:1; }
  }

  @media (prefers-reduced-motion: reduce){
    body.is-playing .on-air .dot,
    body.is-playing .waveform span{ animation:none; }
    .word{ transition:none; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <header>
      <div class="brand">
        <h1>Shadowing Studio</h1>
        <p>Nghe — nhìn — nhại lại theo giọng đọc chuẩn</p>
      </div>
      <div class="on-air">
        <span class="dot"></span>
        <span id="onAirLabel">Sẵn sàng</span>
      </div>
    </header>

    <div class="panel">
      <div class="field">
        <label for="topicSelect">Chủ đề</label>
        <select id="topicSelect"></select>
      </div>
      <div class="field">
        <label for="countSelect">Số câu</label>
        <select id="countSelect">
          <option value="5">5 câu</option>
          <option value="10">10 câu</option>
          <option value="15">15 câu</option>
          <option value="20">20 câu</option>
        </select>
      </div>
      <div class="field" style="flex:1 1 180px;">
        <label for="speedControl">Tốc độ đọc</label>
        <input id="speedControl" type="range" min="0.4" max="1.6" step="0.1" value="1" />
      </div>
      <div class="field">
        <label for="modeSelect">Chế độ</label>
        <select id="modeSelect">
          <option value="continuous">Đọc liên tục</option>
          <option value="pause">Dừng để nhại lại</option>
        </select>
      </div>
      <div class="field" id="pauseChunkField">
        <label for="pauseChunkSelect">Mỗi lượt</label>
        <select id="pauseChunkSelect">
          <option value="1">1 câu</option>
          <option value="2">2 câu</option>
        </select>
      </div>
      <div class="btn-row">
        <button id="startBtn">▶ Bắt đầu</button>
        <button id="stopBtn" disabled>■ Dừng</button>
      </div>
    </div>

    <div class="pause-panel" id="pausePanel">
      <div class="pause-text">Tạm dừng để bạn nhại lại — tự đọc tiếp sau <span id="pauseCountdown">6s</span></div>
      <div class="pause-actions">
        <button id="replayBtn" type="button">🔁 Nghe lại</button>
        <button id="continueBtn" type="button">▶ Đọc tiếp ngay</button>
      </div>
    </div>

    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0/0</div>
    </div>
    <div class="status" id="statusLine"></div>

    <div class="reader">
      <div class="reader-head">
        <span class="label">Đoạn văn</span>
        <div class="waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div id="shadowLine"><div class="line" id="lineInner"></div></div>
    </div>

    <footer>Luyện Shadowing • đọc theo từ đang sáng màu, để mắt luôn ở phía trước giọng đọc</footer>
  </div>

  <div id="shadowToast"></div>

  <script src="link.js"></script>
  <script src="shadow.js"></script>
</body>
</html>
