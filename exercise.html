  <script>
    const words = JSON.parse(localStorage.getItem("wordBank")) || [];
    // --- CẤU HÌNH NGẦM ---
    (async function autoSyncMaxLesson() {
      const SHEET_MAX_LESSON_API = "https://script.google.com/macros/s/AKfycbwGc5T0Ei1CA3-LnxSv9JxqqnkL5WeyZFTbgEu0vZTq25E8gypYbP-FRJApNa5oJr12tQ/exec";

      // 1. Lấy tên lớp đang có sẵn trong máy (ví dụ: "3")
      const trainerClass = localStorage.getItem("trainerClass")?.trim();

      if (!trainerClass) {
        console.warn("⚠️ Không tìm thấy tên lớp (trainerClass) trong máy.");
        return;
      }

      try {
        // 2. Gọi lệnh lấy dữ liệu từ Google Apps Script
        const response = await fetch(SHEET_MAX_LESSON_API);
        const data = await response.json();

        // 3. Xử lý dữ liệu (Hỗ trợ cả định dạng Bảng và Mảng JSON)
        let rows = data.table ? data.table.rows : (Array.isArray(data) ? data : []);

        const baiList = rows.map(r => {
          let lop, bai;
          if (r.c) { // Cấu hình cho Google Sheet JSON thô (Cột A và C)
            lop = r.c[0]?.v?.toString().trim();
            bai = r.c[2]?.v?.toString().trim();
          } else { // Cấu hình cho mảng JSON trực tiếp
            lop = (r.Lop || r[0])?.toString().trim();
            bai = (r.MaBai || r[2])?.toString().trim();
          }
          return (lop === trainerClass && bai) ? parseInt(bai, 10) : null;
        }).filter(v => v !== null && !isNaN(v));

        // 4. Tìm số lớn nhất và GHI VÀO LOCAL
        if (baiList.length > 0) {
          const maxCode = Math.max(...baiList);
          localStorage.setItem("maxLessonCode", maxCode);
          console.log(`✅ Đã bí mật cập nhật maxLessonCode: ${maxCode}`);
        }
      } catch (err) {
        console.error("❌ Lỗi lấy Max Lesson:", err);
      }
    })();
    document.getElementById("wordList").textContent = words.join(", ");

    function startExercise(page) {
      window.location.href = `exercises/${page}`;
    }

    function startExerciseWithCheck(partName, page) {
      const currentWords = JSON.parse(localStorage.getItem("wordBank")) || [];
      const key = "checked:" + partName + ":" + currentWords.join(",");
      const checked = localStorage.getItem(key);
      if (checked === "true") {
        startExercise(page);
      } else {
        showPrecheck(partName, page, key);
      }
    }

    function showPrecheck(partName, page, key) {
      document.getElementById("precheckOverlay").style.display = "flex";
      loadPrecheck(partName, page, key);
    }

    async function loadPrecheck(partName, page, key) {
      const SHEET_URL = "https://docs.google.com/spreadsheets/d/1KaYYyvkjFxVVobRHNs9tDxW7S79-c5Q4mWEKch6oqks/gviz/tq?tqx=out:json";
      const wordBank = JSON.parse(localStorage.getItem("wordBank")) || [];
      const checkedWords = JSON.parse(localStorage.getItem("checkedWords") || "[]");

      const res = await fetch(SHEET_URL);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));
      const rows = json.table.rows;

      const vocabList = rows.map(row => ({
        word: row.c[2]?.v?.trim() || "",
        meaning: row.c[24]?.v?.trim() || ""
      })).filter(item => wordBank.includes(item.word));

      const remaining = vocabList.filter(item => !checkedWords.includes(item.word));
      const current = remaining.length > 0
        ? remaining[Math.floor(Math.random() * remaining.length)]
        : vocabList[Math.floor(Math.random() * vocabList.length)];

      if (remaining.length === 0) localStorage.setItem("checkedWords", "[]");

      const wrongChoices = vocabList.filter(w => w.word !== current.word).map(w => w.meaning);
      const options = [current.meaning, ...wrongChoices.slice(0, 3)].sort(() => Math.random() - 0.5);

      document.getElementById("questionWord").textContent = `🔤 Từ: ${current.word}`;
      // 🔊 Đọc to từ tiếng Anh
      const utter = new SpeechSynthesisUtterance(current.word);
      utter.lang = "en-US";
      utter.rate = 0.9;
      speechSynthesis.speak(utter);

      
      const choicesArea = document.getElementById("choicesArea");
      choicesArea.innerHTML = "";

      const row1 = document.createElement("div");
      const row2 = document.createElement("div");
      row1.style.display = "flex";
      row2.style.display = "flex";
      row1.style.justifyContent = "center";
      row2.style.justifyContent = "center";
      row1.style.gap = "12px";
      row2.style.gap = "12px";
      row1.style.marginBottom = "12px";

      options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
        btn.style.padding = "16px 24px";
        btn.style.fontSize = "20px";
        btn.style.borderRadius = "12px";
        btn.style.minWidth = "120px";
        btn.style.cursor = "pointer";
        btn.style.background = "#fff";
        btn.style.color = "#000";
        btn.style.border = "2px solid #ccc";
        btn.onclick = () => handlePrecheckAnswer(opt, current.meaning, current.word, key);

        if (i < 2) {
          row1.appendChild(btn);
        } else {
          row2.appendChild(btn);
        }
      });

      choicesArea.appendChild(row1);
      choicesArea.appendChild(row2);


      document.getElementById("precheckStatus").textContent = "";
    }

    function handlePrecheckAnswer(selected, correct, word, key) {
      const status = document.getElementById("precheckStatus");
      
      if (selected === correct) {
        // 🔊 Đọc từ vựng khi trả lời đúng
        speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(word);
        utter.lang = "en-US";
        utter.rate = 0.9;
        speechSynthesis.speak(utter);

        const checkedWords = JSON.parse(localStorage.getItem("checkedWords") || "[]");
        if (!checkedWords.includes(word)) {
          checkedWords.push(word);
          localStorage.setItem("checkedWords", JSON.stringify(checkedWords));
        }
        localStorage.setItem(key, "true");
        status.textContent = "✅ Chính xác! Bạn có thể vào nhiệm vụ.";
        setTimeout(() => {
          document.getElementById("precheckOverlay").style.display = "none";
        }, 1200);
      } else {
        status.textContent = "❌ Sai rồi! Thử lại câu này.";
      }

    }
  </script>
  <script>
    (function() {
      const bgClasses = [
        'bg-gradient-1', 'bg-gradient-2', 'bg-gradient-3',
        'bg-gradient-4', 'bg-gradient-5', 'bg-gradient-6',
        'bg-gradient-7', 'bg-gradient-8', 'bg-gradient-9',
        'bg-gradient-10'
      ];

      function getRandomClass() {
        return bgClasses[Math.floor(Math.random() * bgClasses.length)];
      }

      function applyBackground(className) {
        bgClasses.forEach(cls => document.body.classList.remove(cls));
        document.body.classList.add(className);
      }

      // Kiểm tra sessionStorage để biết có phải vừa back từ trang khác không
      const lastBg = sessionStorage.getItem('pokeword_last_bg');
      const lastVisit = sessionStorage.getItem('pokeword_last_visit');
      const now = Date.now();

      if (lastBg && lastVisit && (now - parseInt(lastVisit)) < 5000) {
        // Nếu back trong vòng 5 giây, giữ nguyên màu
        applyBackground(lastBg);
        console.log(`🎨 Giữ background: ${lastBg}`);
      } else {
        // Random màu mới
        const newBg = getRandomClass();
        applyBackground(newBg);
        sessionStorage.setItem('pokeword_last_bg', newBg);
        console.log(`🎨 Background mới: ${newBg}`);
      }

      // Luôn cập nhật thời gian truy cập
      sessionStorage.setItem('pokeword_last_visit', now.toString());

      // Bắt sự kiện pageshow để đổi màu khi back
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
          // Back từ trang khác - đổi màu
          const newBg = getRandomClass();
          applyBackground(newBg);
          sessionStorage.setItem('pokeword_last_bg', newBg);
          sessionStorage.setItem('pokeword_last_visit', Date.now().toString());
          console.log(`🎨 Back - đổi sang: ${newBg}`);
        }
      });

    })();
  </script>
